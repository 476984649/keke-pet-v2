name: Build Windows
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install

      - name: Build
        shell: pwsh
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find ALL exe files
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Searching recursively for *.exe ==="
          Get-ChildItem -Path . -Recurse -Filter *.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName " - " $_.Length "bytes" }
          Write-Host "=== Done ==="

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keke-pet
          path: "**/keke-pet.exe"
